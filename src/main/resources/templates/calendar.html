<!DOCTYPE html>
<html lang="pt-br">
<head>
    <th:block th:replace="~{fragments/head :: commonAssets}"></th:block>

    <meta name="robots" content="max-image-preview:large">
    <meta name="googlebot" content="all">
    <meta name="keywords" content="Calendário anime, lançamentos semanais, episódios por dia, temporada anime, Isekai Hub">

    <th:block th:replace="~{fragments/head :: seo('Calendário de Lançamentos - Isekai Hub', 'Calendário de lançamentos de animes da temporada. Veja quais episódios saem em cada dia da semana no Isekai Hub.', '/calendar', null, null)}"></th:block>

    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/common.css}" />
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/calendar.css}" />

</head>
<body>

    <header th:replace="~{fragments/layout :: header}"></header>

    <div class="main-wrapper">
        <main class="content-area">
            <div class="calendar-centralized-wrapper">
                <div class="section-header">
                    <h2 class="section-title">📅 Agenda da Semana</h2>
                </div>

                <div class="day-filter">
                    <button class="chip" data-day="0">Seg</button>
                    <button class="chip" data-day="1">Ter</button>
                    <button class="chip" data-day="2">Qua</button>
                    <button class="chip" data-day="3">Qui</button>
                    <button class="chip" data-day="4">Sex</button>
                    <button class="chip" data-day="5">Sáb</button>
                    <button class="chip active" data-day="6">Dom</button>
                </div>

                <div class="list-container" id="scheduleList">
                </div>
            </div>
        </main>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <script defer type="text/javascript" th:src="@{/js/common.js}"></script>
    <script defer type="text/javascript" th:src="@{/js/calendar.js}"></script>

</body>
</html>
