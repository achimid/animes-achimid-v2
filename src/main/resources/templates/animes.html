<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catálogo de Animes - Animes Achimid</title>

    <meta name="robots" content="max-image-preview:large">
    <meta name="googlebot" content="all">

    <meta name="description" content="Explore o catálogo completo de animes no Animes Achimid. Filtre por gênero, pesquise por nome e descubra novos títulos da temporada.">
    <meta name="keywords" content="Catálogo de animes, lista de animes, animes por gênero, temporada anime, Animes Achimid">
    <meta property="og:title" content="Catálogo de Animes - Animes Achimid">
    <meta property="og:description" content="Explore o catálogo completo de animes no Animes Achimid. Filtre por gênero, pesquise por nome e descubra novos títulos da temporada.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:site_name" content="Animes Achimid">
    <meta property="og:url" content="https://animes.achimid.com.br/animes">
    <meta property="og:image" content="https://animes.achimid.com.br/img/banner-small.png">

    <link rel="canonical" href="https://animes.achimid.com.br/animes">

    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="manifest" href="/favicon/site.webmanifest">

    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Righteous&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-89V9QWJ1Q4"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('consent', 'default', { 'ad_storage': 'denied', 'analytics_storage': 'denied' });
        try { if (localStorage.getItem('cookie_consent') === 'accepted') { gtag('consent', 'update', { 'ad_storage': 'granted', 'analytics_storage': 'granted' }); } } catch (e) {}
        gtag('js', new Date());
        gtag('config', 'G-89V9QWJ1Q4');
    </script>
    <meta name="google-site-verification" content="_TNQ2lXCMgZqsSzlzOXC2PbzOrWopVSYFHmUBen1Q6c" />

    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/common.css}" />
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/animes.css}" />
</head>
<body>

    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="container-list">
        <div class="controls-container">
            <div class="search-box">
                <label class="label-style">Filtrar por nome</label>
                <input type="text" id="animeSearchList" class="input-style" placeholder="Digite para buscar...">
            </div>

            <div class="filter-group-wrapper">
                <div class="filter-item">
                    <label class="label-style" for="animeSort">Ordenação</label>
                    <select id="animeSort" class="input-style">
                        <option value="recent">Mais Recentes</option>
                        <option value="score">Melhor Avaliação</option>
                        <option value="popular">Mais Populares</option>
                        <option value="az">A → Z</option>
                        <option value="za">Z → A</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label class="label-style" for="animeGenre">Gênero</label>
                    <select id="animeGenre" class="input-style">
                        <option value="">Todos</option>
                        <option value="Action">Ação</option>
                        <option value="Adventure">Aventura</option>
                        <option value="Comedy">Comédia</option>
                        <option value="Drama">Drama</option>
                        <option value="Fantasy">Fantasia</option>
                        <option value="Romance">Romance</option>
                        <option value="Sci-Fi">Ficção Científica</option>
                        <option value="Horror">Terror</option>
                        <option value="Mystery">Mistério</option>
                        <option value="Thriller">Suspense</option>
                        <option value="Slice of Life">Slice of Life</option>
                        <option value="Sports">Esportes</option>
                        <option value="Supernatural">Sobrenatural</option>
                        <option value="Mecha">Mecha</option>
                        <option value="Isekai">Isekai</option>
                        <option value="Ecchi">Ecchi</option>
                        <option value="Military">Militar</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="animeContainer">
            <article class="anime-card-compact" th:each="anime : ${animeList}">
                <a class="card-thumb" th:href="|/anime/${anime.slug}|" >
                    <img th:src="${anime.imageUrl}" th:alt="${anime.name}" loading="lazy">
                </a>
                <div class="card-content">
                    <div class="card-top">
                        <a class="card-title" th:href="|/anime/${anime.slug}|" th:text="${anime.name}">Anime Name</a>
                        <div class="card-score">★ <span th:text="${anime.score}">Anime Rating</span></div>
                    </div>
                    <div class="card-info-grid">
                        <div class="info-item" th:each="info : ${anime.infoList}">
                            <strong th:text="${info.infoName}">Estúdio:</strong>
                            <span th:text="${info.infoValue}">Madhouse</span>
                        </div>
                    </div>
                    <div class="card-footer-tags">
                        <span class="mini-tag" th:each="tag : ${anime.tags}" th:text="${tag}">Ação</span>
                    </div>
                </div>
            </article>
        </div>

        <div class="pagination">
            <div class="page-item active">1</div>
            <div class="page-item">2</div>
            <div class="page-item">3</div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <script type="text/javascript" th:src="@{/js/common.js}"></script>
    <script type="text/javascript" th:src="@{/js/animes.js}"></script>
</body>
</html>
