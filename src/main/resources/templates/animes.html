<!DOCTYPE html>
<html lang="pt-br">
<head>
    <th:block th:replace="~{fragments/head :: commonAssets}"></th:block>

    <meta name="robots" content="max-image-preview:large">
    <meta name="googlebot" content="all">
    <meta name="keywords" content="catálogo de animes, lista de animes, animes por gênero, buscar anime, animes da temporada, anime legendado PT-BR">

    <th:block th:replace="~{fragments/head :: seo('Catálogo de Animes - Isekai Hub', 'Catálogo completo de animes no Isekai Hub: filtre por gênero, busque por nome em tempo real e descubra os títulos da temporada com notas, capas e sinopses em PT-BR.', '/animes', null, null)}"></th:block>

    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/common.css}" />
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/animes.css}" />
</head>
<body>

    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="container-list">
        <div class="controls-container">
            <div class="search-box">
                <label class="label-style">Filtrar por nome</label>
                <input type="text" id="animeSearchList" class="input-style" placeholder="Digite para buscar...">
            </div>

            <div class="filter-group-wrapper">
                <div class="filter-item">
                    <label class="label-style" for="animeSort">Ordenação</label>
                    <select id="animeSort" class="input-style">
                        <option value="recent">Mais Recentes</option>
                        <option value="score">Melhor Avaliação</option>
                        <option value="popular">Mais Populares</option>
                        <option value="az">A → Z</option>
                        <option value="za">Z → A</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label class="label-style" for="animeGenre">Gênero</label>
                    <select id="animeGenre" class="input-style">
                        <option value="">Todos</option>
                        <option value="Action">Ação</option>
                        <option value="Adventure">Aventura</option>
                        <option value="Comedy">Comédia</option>
                        <option value="Drama">Drama</option>
                        <option value="Fantasy">Fantasia</option>
                        <option value="Romance">Romance</option>
                        <option value="Sci-Fi">Ficção Científica</option>
                        <option value="Horror">Terror</option>
                        <option value="Mystery">Mistério</option>
                        <option value="Thriller">Suspense</option>
                        <option value="Slice of Life">Slice of Life</option>
                        <option value="Sports">Esportes</option>
                        <option value="Supernatural">Sobrenatural</option>
                        <option value="Mecha">Mecha</option>
                        <option value="Isekai">Isekai</option>
                        <option value="Ecchi">Ecchi</option>
                        <option value="Military">Militar</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="animeContainer">
            <article class="anime-card-compact" th:each="anime : ${animeList}">
                <a class="card-thumb" th:href="|/anime/${anime.slug}|" >
                    <img th:src="${anime.imageUrl}" th:alt="${anime.name}" loading="lazy">
                </a>
                <div class="card-content">
                    <div class="card-top">
                        <a class="card-title" th:href="|/anime/${anime.slug}|" th:text="${anime.name}">Anime Name</a>
                        <div class="card-score">★ <span th:text="${anime.score}">Anime Rating</span></div>
                    </div>
                    <div class="card-info-grid">
                        <div class="info-item" th:each="info : ${anime.infoList}">
                            <strong th:text="${info.infoName}">Estúdio:</strong>
                            <span th:text="${info.infoValue}">Madhouse</span>
                        </div>
                    </div>
                    <div class="card-footer-tags">
                        <span class="mini-tag" th:each="tag : ${anime.tags}" th:text="${tag}">Ação</span>
                    </div>
                </div>
            </article>
        </div>

        <div id="pagination" class="pagination" th:style="${animeList.totalPages <= 1 ? 'display:none' : ''}">
            <a class="page-item" th:classappend="${animeList.first} ? 'disabled'"
               th:href="|?pageNumber=${animeList.number - 1}|">&#8249;</a>

            <th:block th:each="i : ${#numbers.sequence(
                    T(java.lang.Math).max(0, animeList.number - 2),
                    T(java.lang.Math).min(animeList.totalPages - 1, animeList.number + 2))}">
                <a class="page-item" th:classappend="${i == animeList.number} ? 'active'"
                   th:href="|?pageNumber=${i}|" th:text="${i + 1}">1</a>
            </th:block>

            <a class="page-item" th:classappend="${animeList.last} ? 'disabled'"
               th:href="|?pageNumber=${animeList.number + 1}|">&#8250;</a>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <script defer type="text/javascript" th:src="@{/js/common.js}"></script>
    <script defer type="text/javascript" th:src="@{/js/animes.js}"></script>
</body>
</html>
